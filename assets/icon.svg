<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with nested rounded corners -->
  <rect width="512" height="512" rx="120" fill="#2C3639" />
  
  <!-- Subtle gold frame -->
  <rect x="44" y="44" width="424" height="424" rx="96" fill="none" stroke="#A27B5B" stroke-width="4" opacity="0.3" />
  
  <!-- Geometric Ledger Columns merging into a modern "W" -->
  <g transform="translate(0, 10)">
    <!-- Main "W" Path -->
    <path d="M140 180 L220 340 L256 260 L292 340 L372 180" 
          stroke="#FAF8F5" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" />
          
    <!-- Gold Crown/Goal Node -->
    <circle cx="256" cy="180" r="18" fill="#A27B5B" />
    
    <!-- Ledger Base Accents (Tracking rows) -->
    <rect x="176" y="380" width="160" height="12" rx="6" fill="#A27B5B" opacity="0.8" />
    <rect x="216" y="404" width="80" height="8" rx="4" fill="#FAF8F5" opacity="0.5" />
  </g>
</svg>
