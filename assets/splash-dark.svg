<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="100%" height="100%">
  <!-- Premium Inkwell Dark Background -->
  <rect width="2732" height="2732" fill="#2C3639" />
  
  <!-- Subtle brand background grid overlay -->
  <g opacity="0.02" stroke="#FAF8F5" stroke-width="2">
    <line x1="0" y1="683" x2="2732" y2="683" />
    <line x1="0" y1="1366" x2="2732" y2="1366" />
    <line x1="0" y1="2049" x2="2732" y2="2049" />
    <line x1="683" y1="0" x2="683" y2="2732" />
    <line x1="1366" y1="0" x2="1366" y2="2732" />
    <line x1="2049" y1="0" x2="2049" y2="2732" />
  </g>

  <!-- Centered Brand Icon Container -->
  <g>
    <!-- Rounded Outer Frame representing the logo -->
    <rect x="1206" y="940" width="320" height="320" rx="75" fill="#1C2321" />
    
    <!-- Sub-graphics scaled perfectly from the 512px icon blueprint -->
    <g transform="translate(1206, 940) scale(0.625)">
      <!-- Subtle gold frame -->
      <rect x="44" y="44" width="424" height="424" rx="96" fill="none" stroke="#A27B5B" stroke-width="4" opacity="0.3" />
      
      <!-- Rising Column W Path -->
      <g transform="translate(0, 10)">
        <path d="M140 180 L220 340 L256 260 L292 340 L372 180" 
              stroke="#FAF8F5" 
              stroke-width="36" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              fill="none" />
              
        <circle cx="256" cy="180" r="18" fill="#A27B5B" />
        
        <rect x="176" y="380" width="160" height="12" rx="6" fill="#A27B5B" opacity="0.8" />
        <rect x="216" y="404" width="80" height="8" rx="4" fill="#FAF8F5" opacity="0.5" />
      </g>
    </g>
  </g>

  <!-- App Title Text -->
  <text x="1366" y="1360" 
        text-anchor="middle" 
        font-family="Lora, Georgia, serif" 
        font-size="80" 
        font-weight="700" 
        fill="#FAF8F5" 
        letter-spacing="10">WorkLedger</text>
        
  <!-- App Subtitle -->
  <text x="1366" y="1425" 
        text-anchor="middle" 
        font-family="'Plus Jakarta Sans', sans-serif" 
        font-size="32" 
        font-weight="500" 
        fill="#A27B5B" 
        letter-spacing="3">WORKLOAD &amp; COMMUTE LEDGER</text>
</svg>
